<svg width="900" height="340" viewBox="0 0 900 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#111527"/>
      <stop offset="100%" stop-color="#080A13"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D97757" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#D97757" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="25%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#4ADE80"/>
      <stop offset="75%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="900" height="340" rx="18" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="899" height="339" rx="17.5" stroke="#242A44"/>

  <!-- twinkling starfield -->
  <g fill="#3A4270">
    <circle cx="70" cy="55" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="250" r="1.2"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="45" r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="565" cy="270" r="1.3"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="705" cy="50" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="845" cy="215" r="1.2"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="165" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="795" cy="120" r="1.5"><animate attributeName="opacity" values="1;0.4;1" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="35" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="55" r="1.3"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- header -->
  <text x="30" y="38" font-family="ui-monospace, 'Fira Code', monospace" font-size="12" fill="#8B93B8" letter-spacing="3">AGENT SWARM · ALWAYS RUNNING</text>
  <circle cx="292" cy="33" r="4" fill="#4ADE80">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="870" y="38" text-anchor="end" font-family="ui-monospace, 'Fira Code', monospace" font-size="12" fill="#4A5178">youcisla@prod:~$</text>

  <!-- ================= ORCHESTRATOR ================= -->
  <g transform="translate(450,175)">
    <circle r="78" fill="url(#coreGlow)">
      <animate attributeName="r" values="78;90;78" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="27" fill="#161A2C" stroke="#D97757" stroke-width="2"/>
    <circle r="27" fill="none" stroke="#D97757" stroke-width="1.2" opacity="0.7">
      <animate attributeName="r" values="27;52" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="27" fill="none" stroke="#D97757" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="27;52" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <text y="4" text-anchor="middle" font-family="ui-monospace, 'Fira Code', monospace" font-size="10.5" fill="#F0EEE6" font-weight="700">CLAUDE</text>
    <text y="16" text-anchor="middle" font-family="ui-monospace, 'Fira Code', monospace" font-size="6.5" fill="#D97757" letter-spacing="1">ORCHESTRATOR</text>

    <!-- orbit rings -->
    <circle r="58" fill="none" stroke="#2C3354" stroke-width="1" stroke-dasharray="2 7">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="36s" repeatCount="indefinite"/>
    </circle>
    <circle r="92" fill="none" stroke="#2C3354" stroke-width="1" stroke-dasharray="2 7">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="50s" repeatCount="indefinite"/>
    </circle>
    <circle r="126" fill="none" stroke="#242A44" stroke-width="1" stroke-dasharray="2 9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="70s" repeatCount="indefinite"/>
    </circle>

    <!-- ===== ORBIT 1 · inner · clockwise ===== -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="11s" repeatCount="indefinite"/>
      <g transform="translate(58,0)">
        <circle r="11" fill="#A78BFA" filter="url(#soft)" opacity="0.55"/>
        <circle r="8" fill="#161A2C" stroke="#A78BFA" stroke-width="2"/>
        <circle r="2.6" fill="#A78BFA"><animate attributeName="opacity" values="1;0.25;1" dur="1.1s" repeatCount="indefinite"/></circle>
      </g>
      <g transform="translate(-58,0)">
        <circle r="11" fill="#22D3EE" filter="url(#soft)" opacity="0.55"/>
        <circle r="8" fill="#161A2C" stroke="#22D3EE" stroke-width="2"/>
        <circle r="2.6" fill="#22D3EE"><animate attributeName="opacity" values="0.25;1;0.25" dur="1.1s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- ===== ORBIT 2 · mid · counter-clockwise ===== -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="18s" repeatCount="indefinite"/>
      <g transform="translate(92,0)">
        <circle r="11" fill="#4ADE80" filter="url(#soft)" opacity="0.55"/>
        <circle r="8" fill="#161A2C" stroke="#4ADE80" stroke-width="2"/>
        <circle r="2.6" fill="#4ADE80"><animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/></circle>
      </g>
      <g transform="translate(-46,79.7)">
        <circle r="11" fill="#FBBF24" filter="url(#soft)" opacity="0.55"/>
        <circle r="8" fill="#161A2C" stroke="#FBBF24" stroke-width="2"/>
        <circle r="2.6" fill="#FBBF24"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.4s" repeatCount="indefinite"/></circle>
      </g>
      <g transform="translate(-46,-79.7)">
        <circle r="11" fill="#FB7185" filter="url(#soft)" opacity="0.55"/>
        <circle r="8" fill="#161A2C" stroke="#FB7185" stroke-width="2"/>
        <circle r="2.6" fill="#FB7185"><animate attributeName="opacity" values="0.6;1;0.6" dur="0.9s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- ===== ORBIT 3 · outer · clockwise slow ===== -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="28s" repeatCount="indefinite"/>
      <g transform="translate(126,0)">
        <circle r="10" fill="#F472B6" filter="url(#soft)" opacity="0.5"/>
        <circle r="7" fill="#161A2C" stroke="#F472B6" stroke-width="2"/>
        <circle r="2.3" fill="#F472B6"><animate attributeName="opacity" values="1;0.3;1" dur="1.7s" repeatCount="indefinite"/></circle>
      </g>
      <g transform="translate(-126,0)">
        <circle r="10" fill="#38BDF8" filter="url(#soft)" opacity="0.5"/>
        <circle r="7" fill="#161A2C" stroke="#38BDF8" stroke-width="2"/>
        <circle r="2.3" fill="#38BDF8"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.7s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- data pulses out of core -->
    <circle r="2.4" fill="#22D3EE"><animateMotion path="M0,0 L185,-75" dur="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle r="2.4" fill="#A78BFA"><animateMotion path="M0,0 L-195,65" dur="3.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle r="2.4" fill="#4ADE80"><animateMotion path="M0,0 L155,100" dur="2.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle r="2.4" fill="#FBBF24"><animateMotion path="M0,0 L-165,-95" dur="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle r="2.4" fill="#FB7185"><animateMotion path="M0,0 L15,-135" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ================= LEFT · terminal ================= -->
  <g font-family="ui-monospace, 'Fira Code', monospace" font-size="11.5">
    <rect x="22" y="66" width="240" height="200" rx="10" fill="#0D101E" stroke="#242A44"/>
    <circle cx="40" cy="82" r="4" fill="#FB7185"/><circle cx="54" cy="82" r="4" fill="#FBBF24"/><circle cx="68" cy="82" r="4" fill="#4ADE80"/>
    <text x="240" y="86" text-anchor="end" font-size="9" fill="#4A5178">swarm.log</text>

    <text x="38" y="114" fill="#A78BFA">▸ plan</text>
    <text x="98" y="114" fill="#5C648E">architecture drafted<animate attributeName="opacity" values="0.35;1;0.35" dur="3s" repeatCount="indefinite"/></text>
    <text x="38" y="140" fill="#22D3EE">▸ code</text>
    <text x="98" y="140" fill="#5C648E">features shipping<animate attributeName="opacity" values="0.35;1;0.35" dur="3s" begin="0.5s" repeatCount="indefinite"/></text>
    <text x="38" y="166" fill="#4ADE80">▸ test</text>
    <text x="98" y="166" fill="#5C648E">all green<animate attributeName="opacity" values="0.35;1;0.35" dur="3s" begin="1s" repeatCount="indefinite"/></text>
    <text x="38" y="192" fill="#FBBF24">▸ ship</text>
    <text x="98" y="192" fill="#5C648E">deployed to prod<animate attributeName="opacity" values="0.35;1;0.35" dur="3s" begin="1.5s" repeatCount="indefinite"/></text>
    <text x="38" y="218" fill="#FB7185">▸ watch</text>
    <text x="98" y="218" fill="#5C648E">channels on autopilot<animate attributeName="opacity" values="0.35;1;0.35" dur="3s" begin="2s" repeatCount="indefinite"/></text>
    <text x="38" y="244" fill="#F0EEE6">▸ _</text>
    <rect x="58" y="235" width="7" height="11" fill="#F0EEE6"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
  </g>

  <!-- ================= RIGHT · metrics ================= -->
  <g font-family="ui-monospace, 'Fira Code', monospace">
    <rect x="638" y="66" width="240" height="200" rx="10" fill="#0D101E" stroke="#242A44"/>
    <text x="656" y="94" font-size="10" fill="#8B93B8" letter-spacing="2">AUTOMATION UPTIME</text>
    <text x="656" y="126" font-size="24" fill="#F0EEE6" font-weight="700">since 2020</text>

    <rect x="656" y="142" width="204" height="5" rx="2.5" fill="#242A44"/>
    <rect x="656" y="142" width="204" height="5" rx="2.5" fill="url(#track)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </rect>

    <text x="656" y="172" font-size="10" fill="#8B93B8" letter-spacing="2">PIPELINES</text>
    <text x="860" y="172" text-anchor="end" font-size="10" fill="#4ADE80">RUNNING</text>
    <text x="656" y="194" font-size="10" fill="#8B93B8" letter-spacing="2">CHANNELS</text>
    <text x="860" y="194" text-anchor="end" font-size="10" fill="#22D3EE">MULTI</text>
    <text x="656" y="216" font-size="10" fill="#8B93B8" letter-spacing="2">HUMAN HANDS</text>
    <text x="860" y="216" text-anchor="end" font-size="10" fill="#FB7185">ZERO</text>

    <text x="656" y="248" font-size="11" fill="#5C648E">one n8n brain, many hands<animate attributeName="opacity" values="0.45;1;0.45" dur="4s" repeatCount="indefinite"/></text>
  </g>

  <!-- ================= BOTTOM · tiny agent swarm racing ================= -->
  <line x1="30" y1="300" x2="870" y2="300" stroke="#242A44" stroke-width="1"/>
  <line x1="30" y1="300" x2="870" y2="300" stroke="url(#track)" stroke-width="1" opacity="0.35"/>
  <circle r="3.5" fill="#A78BFA"><animateMotion path="M30,300 L870,300" dur="7s" repeatCount="indefinite"/></circle>
  <circle r="3" fill="#22D3EE"><animateMotion path="M30,300 L870,300" dur="9s" begin="1s" repeatCount="indefinite"/></circle>
  <circle r="3.5" fill="#4ADE80"><animateMotion path="M30,300 L870,300" dur="6s" begin="2.5s" repeatCount="indefinite"/></circle>
  <circle r="3" fill="#FBBF24"><animateMotion path="M30,300 L870,300" dur="11s" begin="0.4s" repeatCount="indefinite"/></circle>
  <circle r="3.5" fill="#FB7185"><animateMotion path="M870,300 L30,300" dur="8s" repeatCount="indefinite"/></circle>
  <circle r="3" fill="#F472B6"><animateMotion path="M870,300 L30,300" dur="10s" begin="1.8s" repeatCount="indefinite"/></circle>
  <circle r="3" fill="#38BDF8"><animateMotion path="M870,300 L30,300" dur="6.5s" begin="3s" repeatCount="indefinite"/></circle>
  <text x="450" y="326" text-anchor="middle" font-family="ui-monospace, 'Fira Code', monospace" font-size="9.5" fill="#4A5178" letter-spacing="2">TINY AGENTS · NEVER IDLE</text>
</svg>
